commands:
  # Aqui em cima voce vai achar mensagens que podem ser utilizadas em varios comandos
  home-already-exist: "&cVoce ja tem uma home com este nome."
  home-doesnt-exist: "&cVoce nao tem nenhuma home com este nome."
  home-doesnt-exist-others: "&e%player% &cnao tem nenhuma home com este nome."
  no-permission: "&cVoce nao tem permissao para executar este comando."
  cooldown: "&cVoce precisa esperar %time% segundos para executar este comanda novamente."
  cant-use-2dot: "&cVoce nao pode usar &e':' &cneste comando."
  cant-find-player: "&cEste jogador nao foi encontrado."

  # Aqui embaixo vai achar mensagens especificas de alguns comandos.
  sethome:
    usage: "&c-> /sethome (Home)"
    output: "&aA home &e'%home%' &afoi setada para sua posicao."
    limit-reached: "&cVocê não pode setar mais homes, pois chegou no seu limite de homes &e(%limit% homes)&c!"
  delhome:
    usage: "&c-> /delhome (Home)"
    output: "&cA home &e'%home%' &cfoi deletada."
  home:
    usage: "&c-> /home (Home | Player:Home)"
    output: "&aTeleportando para &e'%home%'&a..."
    cant-dimensional-teleport: "&cSeu teleporte foi cancelado! Teleportacao interdimensional nao esta ativada."
  homes:
    output: "&7Suas homes: &e%homes%"
  zhomes:
    usage: "&c-> /zhomes (reload|rl)"
    reload:
      output: "&aO plugin foi recarregado com sucesso."