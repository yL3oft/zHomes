commands:
  # Up here you will find messages that can be used in multiple commands
  home-already-exist: "&cYou already have a home with this name."
  home-doesnt-exist: "&cYou don't have any home with this name."
  home-doesnt-exist-others: "&e%player% &cdon't have any home with this name."
  no-permission: "&cYou don't have permission to execute this command."
  cooldown: "&cYou need to wait %time% seconds to execute this command again."
  cant-use-2dot: "&cYou can't use &e':' &cin this command."
  cant-find-player: "&cThis player was not found."

  # Below you will find messages specific for the commands
  sethome:
    usage: "&c-> /sethome (Home)"
    output: "&aHome &e'%home%' &aset to your position."
    limit-reached: "&cYou can't set more homes because you reached your homes limit &e(%limit% homes)&c!"
  delhome:
    usage: "&c-> /delhome (Home)"
    output: "&cHome &e'%home%' &cdeleted."
  home:
    usage: "&c-> /home (Home | Player:Home)"
    output: "&aTeleporting to &e'%home%'&a..."
    cant-dimensional-teleport: "&cYour teleport was cancelled! Dimensional teleportation is not enable."
  homes:
    output: "&7Your homes: &e%homes%"
  zhomes:
    usage: "&c-> /zhomes (reload|rl)"
    reload:
      output: "&aThe plugin has been reloaded successfully."